<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Libro</title>
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <h1 id="titulo-form">Añadir Libro</h1>
    <form id="form-libro">
        <input type="hidden" id="libro-id">
        <input type="text" id="libro-titulo" placeholder="Titulo" required>
        <input type="text" id="libro-autor" placeholder="Autor" required>
        <select id="libro-disponible">
            <option value="1">Disponible</option>
            <option value="0">Ocupado</option>
        </select>
        <button type="submit">Guardar</button>
        <button type="button" id="btn-cancelar">Cancelar</button>
    </form>
    <script src="../js/form-libro.js"></script>
</body>
</html>
