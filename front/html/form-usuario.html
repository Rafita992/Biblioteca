<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Usuario</title>
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <h1 id="titulo-form">Añadir usuario</h1>

    <form id="form-usuario">
        <input type="hidden" id="usuario-id">
        <input type="text" id="usuario-nombre" placeholder="Nombre" required>
        <input type="email" id="usuario-email" placeholder="Email" required>
        <input type="password" id="usuario-password" placeholder="Contraseña">
        <select id="usuario-rol">
            <option value="usuario">Usuario</option>
            <option value="admin">Admin</option>
        </select>
        <button type="submit">Guardar</button>
        <button type="button" id="btn-cancelar">Cancelar</button>
    </form>

    <script src="../js/form-usuario.js"></script>
</body>
</html>
